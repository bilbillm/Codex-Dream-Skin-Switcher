name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build WinForms application
        shell: pwsh
        run: dotnet build .\src\CodexThemeSwitcher\CodexThemeSwitcher.csproj -c Release

      - name: Run JavaScript tests
        shell: pwsh
        run: node --test .\engine\tests\*.test.mjs

      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem -Recurse -File -Include *.ps1
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$($file.FullName): $($errors.Message -join '; ')"
            }
          }

      - name: Build self-contained release bundle
        shell: powershell
        run: .\scripts\build-release.ps1 -Version 0.1.0

      - name: Verify release bundle
        shell: powershell
        run: .\scripts\verify-release.ps1 -Version 0.1.0
