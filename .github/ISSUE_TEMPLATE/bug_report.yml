name: Bug report
description: Report a reproducible launcher, hot-switch, rendering, or compatibility problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Remove credentials, Browser IDs, conversation content, and unrelated personal paths before submitting logs.
  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: codex
    attributes:
      label: Codex Store package version
      placeholder: OpenAI.Codex 26.x.x.x
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the shortest deterministic sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, Browser IDs, conversations, and unrelated personal information.
          required: true
